<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout — LUXE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <div class="container header-inner">
      <div class="logo">
        <div class="logo-mark"><span></span></div>
        <span class="logo-text">LUXE</span>
      </div>
      <div class="secure-badge">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
        دفع آمن ومشفر
      </div>
    </div>
  </header>

  <!-- MAIN -->
  <main class="container main-grid">

    <!-- RIGHT COLUMN: Order Summary -->
    <aside class="order-summary">
      <h3 class="section-title">ملخص الطلب</h3>

      <div class="products-list">
        <div class="product-item">
          <div class="product-thumb"><div class="thumb-inner"></div></div>
          <div class="product-info">
            <p class="product-name">حذاء جلدي كلاسيكي</p>
            <p class="product-qty">الكمية: 1</p>
          </div>
          <span class="product-price">٨٥٠ ر.س</span>
        </div>
        <div class="product-item">
          <div class="product-thumb"><div class="thumb-inner"></div></div>
          <div class="product-info">
            <p class="product-name">حقيبة يد فاخرة</p>
            <p class="product-qty">الكمية: 1</p>
          </div>
          <span class="product-price">١٬٢٠٠ ر.س</span>
        </div>
      </div>

      <hr class="divider" />

      <!-- Discount -->
      <div id="discount-input-wrap" class="discount-row">
        <input
          id="discount-input"
          data-testid="input-discount"
          type="text"
          placeholder="كود الخصم"
          class="form-input"
        />
        <button
          id="apply-discount-btn"
          data-testid="button-apply-discount"
          class="btn btn-outline"
          onclick="applyDiscount()"
        >تطبيق</button>
      </div>
      <div id="discount-applied" class="discount-applied hidden">
        <div class="discount-applied-label">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
          تم تطبيق الكود
        </div>
        <span id="discount-saved"></span>
      </div>

      <!-- Totals -->
      <div class="totals">
        <div class="total-row">
          <span>المجموع الفرعي</span>
          <span>٢٬٠٥٠ ر.س</span>
        </div>
        <div class="total-row">
          <span>الشحن</span>
          <span>٥٠ ر.س</span>
        </div>
        <div id="discount-row" class="total-row discount-line hidden">
          <span>الخصم</span>
          <span id="discount-amount-display"></span>
        </div>
      </div>

      <hr class="divider" />

      <div class="grand-total-row">
        <div>
          <span class="grand-label">الإجمالي</span>
          <span class="vat-note">شامل ضريبة القيمة المضافة</span>
        </div>
        <div class="grand-amount-wrap">
          <span id="old-total" class="old-price hidden">٢٬١٠٠ ر.س</span>
          <span id="grand-total" class="grand-amount">٢٬١٠٠ ر.س</span>
        </div>
      </div>
    </aside>

    <!-- LEFT COLUMN: Payment + Address -->
    <section class="payment-section">

      <!-- Payment Method -->
      <div class="form-group">
        <h2 class="section-title">طريقة الدفع</h2>
        <div class="tabs">
          <button
            id="tab-card"
            data-testid="tab-card"
            class="tab-btn active"
            onclick="switchTab('card')"
          >بطاقة بنكية</button>
          <button
            id="tab-wallet"
            data-testid="tab-wallet"
            class="tab-btn"
            onclick="switchTab('wallet')"
          >محفظة إلكترونية</button>
        </div>

        <!-- Card Fields -->
        <div id="card-fields" class="tab-panel">
          <div class="field-group">
            <label class="field-label">رقم البطاقة</label>
            <div class="input-with-icons">
              <input
                id="card-number"
                data-testid="input-card-number"
                type="text"
                placeholder="0000 0000 0000 0000"
                class="form-input ltr-input"
                maxlength="19"
                oninput="formatCardNumber(this)"
              />
              <div class="card-brands">
                <!-- Visa SVG -->
                <svg viewBox="0 0 48 16" height="16" xmlns="http://www.w3.org/2000/svg"><text x="0" y="14" font-family="Arial" font-weight="bold" font-size="14" fill="#888">VISA</text></svg>
                <!-- Mastercard circles -->
                <svg viewBox="0 0 34 22" height="18" xmlns="http://www.w3.org/2000/svg">
                  <circle cx="13" cy="11" r="11" fill="#888" opacity="0.6"/>
                  <circle cx="21" cy="11" r="11" fill="#555" opacity="0.6"/>
                </svg>
              </div>
            </div>
          </div>
          <div class="field-group">
            <label class="field-label">اسم حامل البطاقة</label>
            <input
              data-testid="input-cardholder"
              type="text"
              placeholder="الاسم كما هو مطبوع على البطاقة"
              class="form-input"
            />
          </div>
          <div class="fields-row">
            <div class="field-group">
              <label class="field-label">تاريخ الانتهاء</label>
              <input
                data-testid="input-expiry"
                type="text"
                placeholder="MM/YY"
                class="form-input ltr-input"
                maxlength="5"
                oninput="formatExpiry(this)"
              />
            </div>
            <div class="field-group">
              <label class="field-label">رمز CVV</label>
              <input
                data-testid="input-cvv"
                type="password"
                placeholder="123"
                class="form-input ltr-input"
                maxlength="4"
              />
            </div>
          </div>
        </div>

        <!-- Wallet Fields -->
        <div id="wallet-fields" class="tab-panel hidden">
          <div class="wallet-options">
            <button class="wallet-btn apple-pay" aria-label="Apple Pay">
              <svg viewBox="0 0 56 24" height="22" xmlns="http://www.w3.org/2000/svg"><text x="0" y="18" font-family="Arial" font-weight="bold" font-size="16" fill="white"> Pay</text></svg>
            </button>
            <button class="wallet-btn google-pay" aria-label="Google Pay">
              <svg viewBox="0 0 72 28" height="22" xmlns="http://www.w3.org/2000/svg"><text x="0" y="20" font-family="Arial" font-weight="bold" font-size="18" fill="#333">G Pay</text></svg>
            </button>
          </div>
        </div>
      </div>

      <hr class="divider" />

      <!-- Billing Address -->
      <div class="form-group">
        <h2 class="section-title">عنوان الفاتورة</h2>
        <div class="fields-row">
          <div class="field-group">
            <label class="field-label">الدولة</label>
            <input type="text" value="المملكة العربية السعودية" class="form-input readonly-input" readonly />
          </div>
          <div class="field-group">
            <label class="field-label">المدينة</label>
            <input type="text" placeholder="الرياض" class="form-input" />
          </div>
        </div>
        <div class="field-group">
          <label class="field-label">الشارع والحي</label>
          <input type="text" placeholder="اسم الشارع، رقم المبنى" class="form-input" />
        </div>
      </div>

      <!-- CTA -->
      <button
        data-testid="button-place-order"
        class="btn btn-primary btn-full"
        onclick="placeOrder()"
      >
        إتمام الطلب — <span id="cta-total">٢٬١٠٠ ر.س</span>
      </button>

      <!-- Trust Signals -->
      <div class="trust-signals">
        <div class="trust-item">
          <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
          SSL 256-bit
        </div>
        <div class="trust-dot"></div>
        <div class="trust-item">
          <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
          ضمان 30 يوماً
        </div>
        <div class="trust-dot"></div>
        <div class="trust-item">
          <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
          دفع آمن 100%
        </div>
      </div>

    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
